<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>Bienvenido</h2>
        <p>Inicia sesión para gestionar tus finanzas</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" id="btn-login">Ingresar</button>
            <div id="mensaje-error" class="error-oculto">Correo o contraseña incorrectos.</div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
