<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Anual de Finanzas</title>
    <!-- Vinculamos tu mismo CSS mágico -->
    <link rel="stylesheet" href="style.css">
    <!-- Evitamos el error del favicon -->
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <!-- Chart.js para la gráfica -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/jpeg" sizes="192x192" href="94695.ico">
    <link rel="apple-touch-icon" href="94695.ico">
</head>
<body class="dashboard-body">

    <!-- Encabezado con botón para regresar -->
    <header class="dashboard-header">
        <div class="header-info">
            <h1>Análisis Histórico Financiero</h1>
            <p>Compara tus ingresos y gastos mes a mes</p>
        </div>
        <div class="acciones-bar" style="margin-bottom: 0;">
            <button onclick="window.location.href='dashboard.html'" class="btn-secundario">← Volver al Dashboard</button>
        </div>
    </header>

    <!-- Controles de Filtro y Resumen con las 3 columnas -->
    <div class="widgets-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
        <div class="widget">
            <h3>Selecciona un Año</h3>
            <div class="input-group" style="margin-bottom: 0;">
                <select id="filtro-anio" style="font-size: 1.2em; text-align: center; cursor: pointer;">
                    <option value="">Cargando años...</option>
                </select>
            </div>
        </div>
        <div class="widget">
            <h3>Total Ingresos (Año)</h3>
            <p id="total-anio-ingresos" class="monto">$0.00</p>
        </div>
        <div class="widget">
            <h3>Total Gastos (Año)</h3>
            <p id="total-anio-gastos" class="monto gasto">$0.00</p>
        </div>
    </div>

    <div class="main-grid">
        <!-- Tabla Resumen por Mes (Columnas separadas) -->
        <section class="panel">
            <h2>Resumen Mensual</h2>
            <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                <table id="tabla-historial">
                    <thead>
                        <tr>
                            <th>Mes</th>
                            <th>Ingresos</th>
                            <th>Gastos</th>
                            <th>Balance</th>
                        </tr>
                    </thead>
                    <tbody id="historial-completo-body">
                        <tr><td colspan="4" style="text-align: center;">Cargando historial...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Gráfica de barras comparativa -->
        <section class="panel">
            <h2>Comportamiento Anual</h2>
            <div class="chart-section" style="height: 400px; position: relative;">
                <canvas id="graficaAnual"></canvas>
            </div>
        </section>
    </div>

    <!-- Script dedicado para esta página -->
    <script src="historial.js"></script>
</body>
</html>
